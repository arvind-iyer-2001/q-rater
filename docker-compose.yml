version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Pull gemma4 on first start (remove if model is already present in the volume)
    entrypoint: >
      sh -c "ollama serve &
             sleep 5 &&
             ollama pull gemma4 &&
             wait"
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - media_tmp:/tmp/q_rater_media
    depends_on:
      - redis
      - ollama
    restart: unless-stopped

  worker:
    build: ./backend
    command: arq app.tasks.worker.WorkerSettings
    env_file:
      - ./backend/.env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - media_tmp:/tmp/q_rater_media
    depends_on:
      - redis
      - ollama
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
    command: sh -c "npm install && npm run dev"
    restart: unless-stopped

volumes:
  media_tmp:
  ollama_data:
